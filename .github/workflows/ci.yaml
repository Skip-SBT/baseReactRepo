name: ci

on:
  push:
    branches:
      - main
      - live
      - testing
  pull_request:
    branches:
      - main
      - live
      - testing

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run all checks
        run: npm run check:all
